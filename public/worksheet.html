<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F8F4EE; color: #16120E; font-size: 15px; }
.pg { max-width: 720px; margin: 0 auto; background: white; min-height: 100vh; padding: 32px 40px; }
.hd { border-bottom: 3px solid #4A7C59; padding-bottom: 14px; margin-bottom: 22px; }
.ti { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 600; }
.me { font-size: .78rem; color: #7A726A; margin-top: 3px; }
.nr { display: flex; gap: 18px; margin-bottom: 10px; flex-wrap: wrap; }
.nf { flex: 1; min-width: 160px; position: relative; }
.nl { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: #7A726A; display: block; margin-bottom: 3px; }
.ni { width: 100%; border: none; border-bottom: 2px solid #4A7C59; background: transparent; font-size: .92rem; padding: 4px 2px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
.ni:focus { border-bottom-color: #C47B2A; }
.ni.matched { border-bottom-color: #4A7C59; }
.name-suggestion { display: none; background: #FDF4E3; border: 1.5px solid #E8C98A; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .86rem; color: #7A5020; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.name-suggestion.show { display: flex; }
.suggestion-text { flex: 1; }
.suggestion-btns { display: flex; gap: 7px; }
.sug-yes { padding: 6px 14px; background: #4A7C59; color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600; cursor: pointer; }
.sug-no { padding: 6px 14px; background: transparent; border: 1.5px solid #E8C98A; color: #7A5020; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: .82rem; cursor: pointer; }
h2 { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; margin: 18px 0 7px; padding: 7px 13px; background: #EAF0EA; border-left: 3px solid #4A7C59; border-radius: 0 6px 6px 0; }
h3 { font-size: .78rem; font-weight: 600; color: #4A7C59; text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 5px; }
p { margin: 4px 0; line-height: 1.7; }
li { margin-bottom: 3px; line-height: 1.6; }
ul { padding-left: 18px; margin: 5px 0; }
strong { font-weight: 600; }
.wsi { width: 100%; border: none; border-bottom: 2px solid #4A7C59; background: transparent; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 5px 2px; outline: none; color: #16120E; display: block; margin: 3px 0 10px; }
.wsi:focus { border-bottom-color: #C47B2A; background: #FDF4E3; border-radius: 3px 3px 0 0; padding: 5px 8px; }
.wst { width: 100%; border: 2px solid #4A7C59; border-radius: 8px; background: #EAF0EA; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 10px 12px; outline: none; color: #16120E; resize: vertical; min-height: 100px; margin: 5px 0 10px; display: block; }
.wst:focus { border-color: #C47B2A; background: #FDF4E3; }
.wsc { display: flex; flex-wrap: wrap; gap: 8px; margin: 7px 0 12px; }
.wscho { display: flex; align-items: center; gap: 6px; padding: 7px 15px; border: 1.5px solid #E0D8CC; border-radius: 20px; cursor: pointer; font-size: .86rem; background: #F8F4EE; transition: all 0.15s; }
.wscho:has(input:checked) { border-color: #4A7C59; background: #EAF0EA; }
.wswb { background: #E8EFF9; border: 1px solid #B0C8E8; border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
.wswbt { font-size: .6rem; letter-spacing: 1px; text-transform: uppercase; color: #2A5FA5; margin-bottom: 8px; font-weight: 600; }
.wswbw { display: flex; flex-wrap: wrap; gap: 7px; }
.wswbwd { background: white; border: 1px solid #2A5FA5; border-radius: 4px; padding: 2px 10px; font-size: .82rem; }
.wsd { background: #FDF4E3; border: 1px dashed #C47B2A; border-radius: 8px; padding: 14px; margin: 10px 0; font-style: italic; text-align: center; color: #7A5020; }
.submit-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid #E0D8CC; }
.submit-btn { width: 100%; padding: 14px; background: #4A7C59; color: white; border: none; border-radius: 8px; font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.submit-btn:hover { background: #3D6649; }
.submit-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
.success-screen { display: none; text-align: center; padding: 60px 20px; }
.success-icon { font-size: 3rem; margin-bottom: 16px; }
.success-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
.success-sub { color: #7A726A; font-size: .9rem; line-height: 1.6; }
.error-screen { display: none; text-align: center; padding: 60px 20px; }
.loading-screen { text-align: center; padding: 80px 20px; }
.dots { display: inline-flex; gap: 5px; }
.dots span { width: 8px; height: 8px; background: #4A7C59; border-radius: 50%; animation: dp 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dp { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
@media(max-width:600px) { .pg { padding: 20px 16px; } }
@media print { body { background: white; } .pg { padding: 20px; } .submit-section { display: none; } }
</style>
</head>
<body>
<div class="pg">
  <div class="loading-screen" id="loadingScreen">
    <div class="dots"><span></span><span></span><span></span></div>
    <div style="margin-top:14px;color:#7A726A;font-size:.9rem;">Loading your worksheet...</div>
  </div>
  <div class="error-screen" id="errorScreen">
    <div style="font-size:2.5rem;margin-bottom:14px;">🔍</div>
    <div style="font-family:'Fraunces',serif;font-size:1.2rem;font-weight:600;margin-bottom:8px;">Worksheet Not Found</div>
    <div style="color:#7A726A;font-size:.88rem;">This link may have expired or is incorrect. Ask your teacher for the correct link.</div>
  </div>
  <div id="worksheetScreen" style="display:none;">
    <div class="hd">
      <div class="ti" id="wsTitle">Worksheet</div>
      <div class="me" id="wsMeta"></div>
    </div>
    <div class="nr">
      <div class="nf">
        <label class="nl">Your Name</label>
        <input class="ni" type="text" id="studentName" placeholder="Type your first name..." oninput="onNameInput()" onblur="checkName()">
      </div>
      <div class="nf">
        <label class="nl">Date</label>
        <input class="ni" type="text" id="wsDate">
      </div>
    </div>
    <div class="name-suggestion" id="nameSuggestion">
      <div class="suggestion-text" id="suggestionText"></div>
      <div class="suggestion-btns">
        <button class="sug-yes" onclick="acceptSuggestion()">Yes, that's me ✓</button>
        <button class="sug-no" onclick="declineSuggestion()">Keep my name</button>
      </div>
    </div>
    <div id="readingPanel" style="display:none;margin-bottom:22px;">
      <div style="background:#E8EFF9;border:1.5px solid #B0C8E8;border-radius:10px;overflow:hidden;">
        <button onclick="toggleReading()" id="readingToggleBtn"
          style="width:100%;padding:12px 16px;background:#2A5FA5;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;color:white;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;">
          <span>📖 Reading Passage — read this first</span>
          <span id="readingArrow" style="font-size:.75rem;opacity:.8;">▲ Hide</span>
        </button>
        <div id="readingContent" style="padding:18px 20px;font-size:.92rem;line-height:1.8;color:#16120E;"></div>
      </div>
    </div>
    <div id="wsContent"></div>
    <div class="submit-section">
      <button class="submit-btn" id="submitBtn" onclick="submitWorksheet()">✅ Submit Worksheet</button>
    </div>
  </div>
  <div class="success-screen" id="successScreen">
    <div class="success-icon">🎉</div>
    <div class="success-title">Worksheet Submitted!</div>
    <div class="success-sub">Your teacher will review your work.<br>Great job completing it!</div>
  </div>
</div>

<script>
let worksheetId=null, roster=[], matchedStudent=null, wsN=0;

async function loadWorksheet(){
  const params=new URLSearchParams(window.location.search);
  worksheetId=params.get('id');
  if(!worksheetId){showError();return;}
  try{
    const res=await fetch(`/api/worksheet?id=${worksheetId}`);
    if(!res.ok){showError();return;}
    const data=await res.json();
    if(!data||!data.content){showError();return;}
    roster=data.roster||[];

    // Check for split-grade worksheet (grades_content map)
    const gradesContent = data.grades_content;
    if(gradesContent && Object.keys(gradesContent).length > 1){
      // Show grade picker first
      document.getElementById('loadingScreen').style.display='none';
      showGradePicker(data, gradesContent);
      return;
    }

    document.getElementById('wsTitle').textContent='📝 '+data.topic;
    document.getElementById('wsMeta').textContent=(data.grades||[]).join(' / ')+(data.subject?' · '+data.subject:'');
    document.getElementById('wsDate').value=new Date().toLocaleDateString('en-CA');
    document.getElementById('wsContent').innerHTML=renderWS(data.content);

    if(data.reading_resource && data.reading_resource.trim()) {
      document.getElementById('readingPanel').style.display='block';
      document.getElementById('readingContent').innerHTML=renderPassage(data.reading_resource);
    }

    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('worksheetScreen').style.display='block';
    setTimeout(()=>document.getElementById('studentName').focus(),100);
  }catch(e){showError();}
}

function showGradePicker(data, gradesContent){
  const grades = Object.keys(gradesContent);
  const picker = document.createElement('div');
  picker.style.cssText='text-align:center;padding:60px 24px;';
  picker.innerHTML=`
    <div style="font-family:\'Fraunces\',serif;font-size:1.4rem;font-weight:600;margin-bottom:8px;">📝 ${data.topic}</div>
    <div style="color:#7A726A;font-size:.9rem;margin-bottom:32px;">Select your grade to open your worksheet</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      ${grades.map(g=>`
        <button onclick="loadGradeWorksheet('${g}')" style="padding:18px 32px;background:#4A7C59;color:white;border:none;border-radius:10px;font-family:\'Fraunces\',serif;font-size:1.1rem;font-weight:600;cursor:pointer;min-width:140px;">
          ${g}
        </button>`).join('')}
    </div>`;
  document.querySelector('.pg').appendChild(picker);
  // Store data globally for grade selection
  window._wsData = data;
  window._wsGradesContent = gradesContent;
}

function loadGradeWorksheet(grade){
  const data = window._wsData;
  const gradesContent = window._wsGradesContent;
  const wsContent = gradesContent[grade];
  document.querySelector('.pg').querySelector('div[style*="text-align:center"]')?.remove();
  document.getElementById('wsTitle').textContent='📝 '+data.topic;
  document.getElementById('wsMeta').textContent=grade+(data.subject?' · '+data.subject:'');
  document.getElementById('wsDate').value=new Date().toLocaleDateString('en-CA');
  document.getElementById('wsContent').innerHTML=renderWS(wsContent);
  // Clear name and reset match when switching grades
  document.getElementById('studentName').value='';
  document.getElementById('studentName').classList.remove('matched');
  document.getElementById('nameSuggestion').classList.remove('show');
  matchedStudent=null;
  // Filter roster to this grade only
  roster = (data.roster||[]).filter(s => !s.grade || s.grade === grade);
  if(data.reading_resource && data.reading_resource.trim()){
    document.getElementById('readingPanel').style.display='block';
    document.getElementById('readingContent').innerHTML=renderPassage(data.reading_resource);
  }
  document.getElementById('worksheetScreen').style.display='block';
  setTimeout(()=>document.getElementById('studentName').focus(),100);
}

function toggleReading(){
  const content=document.getElementById('readingContent');
  const arrow=document.getElementById('readingArrow');
  if(content.style.display==='none'){
    content.style.display='block';
    arrow.textContent='▲ Hide';
  } else {
    content.style.display='none';
    arrow.textContent='▼ Show';
  }
}

function renderPassage(text){
  if(!text)return'';
  return text
    .replace(/^## (.+)$/gm,'<h2 style="font-family:\'Fraunces\',serif;font-size:1rem;font-weight:600;margin:14px 0 6px;color:#2A5FA5;">$1</h2>')
    .replace(/^### (.+)$/gm,'<h3 style="font-size:.78rem;font-weight:600;color:#4A7C59;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li style="margin-bottom:3px;">$1</li>')
    .replace(/(<li[^>]*>.*?<\/li>\n?)+/gs,m=>`<ul style="padding-left:18px;margin:5px 0;">${m}</ul>`)
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,' ');
}

function showError(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('errorScreen').style.display='block';
}

function onNameInput(){
  document.getElementById('nameSuggestion').classList.remove('show');
  document.getElementById('studentName').classList.remove('matched');
  matchedStudent=null;
  window._pendingSuggestion=null;
  // Fire suggestion while typing if we have enough characters
  const typed=document.getElementById('studentName').value.trim();
  if(typed.length>=2) checkName();
}

function checkName(){
  const typed=document.getElementById('studentName').value.trim();
  if(!typed) return;
  if(!roster.length) return; // no roster — allow any name
  // Exact match — silent green
  const exact=roster.find(s=>
    s.first.toLowerCase()===typed.toLowerCase()||
    `${s.first} ${s.last||''}`.toLowerCase().trim()===typed.toLowerCase()
  );
  if(exact){matchedStudent=exact;document.getElementById('studentName').classList.add('matched');document.getElementById('nameSuggestion').classList.remove('show');return;}
  // Prefix match — "Sofia" matches "Sofia P."
  const prefix=roster.find(s=>
    s.first.toLowerCase().startsWith(typed.toLowerCase())||
    typed.toLowerCase().startsWith(s.first.toLowerCase())
  );
  if(prefix&&prefix.first.toLowerCase()!==typed.toLowerCase()){
    const name=prefix.last?`${prefix.first} ${prefix.last}`:prefix.first;
    document.getElementById('suggestionText').textContent=`Did you mean "${name}"?`;
    document.getElementById('nameSuggestion').classList.add('show');
    window._pendingSuggestion=prefix;
    return;
  }
  if(prefix){matchedStudent=prefix;document.getElementById('studentName').classList.add('matched');return;}
  // Fuzzy — lower threshold
  const best=findBestMatch(typed,roster);
  if(best&&best.score>=0.35){
    const name=best.student.last?`${best.student.first} ${best.student.last}`:best.student.first;
    document.getElementById('suggestionText').textContent=`Did you mean "${name}"?`;
    document.getElementById('nameSuggestion').classList.add('show');
    window._pendingSuggestion=best.student;
  }
}

function checkName(){
  const typed=document.getElementById('studentName').value.trim();
  if(!typed||!roster.length)return;
  // Exact match — silent
  const exact=roster.find(s=>
    s.first.toLowerCase()===typed.toLowerCase()||
    `${s.first} ${s.last||''}`.toLowerCase().trim()===typed.toLowerCase()
  );
  if(exact){matchedStudent=exact;document.getElementById('studentName').classList.add('matched');return;}
  // Prefix match — "Ayaan" matches "Ayaan M"
  const prefix=roster.find(s=>
    s.first.toLowerCase().startsWith(typed.toLowerCase()) ||
    typed.toLowerCase().startsWith(s.first.toLowerCase())
  );
  if(prefix){
    const name=prefix.last?`${prefix.first} ${prefix.last}`:prefix.first;
    if(name.toLowerCase()!==typed.toLowerCase()){
      document.getElementById('suggestionText').textContent=`Did you mean "${name}"?`;
      document.getElementById('nameSuggestion').classList.add('show');
      window._pendingSuggestion=prefix;
      return;
    }
    matchedStudent=prefix;
    document.getElementById('studentName').classList.add('matched');
    return;
  }
  // Fuzzy match
  const best=findBestMatch(typed,roster);
  if(best&&best.score>=0.4){
    const name=best.student.last?`${best.student.first} ${best.student.last}`:best.student.first;
    document.getElementById('suggestionText').textContent=`Did you mean "${name}"?`;
    document.getElementById('nameSuggestion').classList.add('show');
    window._pendingSuggestion=best.student;
  }
}

function acceptSuggestion(){
  if(!window._pendingSuggestion)return;
  matchedStudent=window._pendingSuggestion;
  const name=matchedStudent.last?`${matchedStudent.first} ${matchedStudent.last}`:matchedStudent.first;
  document.getElementById('studentName').value=name;
  document.getElementById('studentName').classList.add('matched');
  document.getElementById('nameSuggestion').classList.remove('show');
  window._pendingSuggestion=null;
}

function declineSuggestion(){
  document.getElementById('nameSuggestion').classList.remove('show');
  window._pendingSuggestion=null;
}

function findBestMatch(typed,roster){
  let best=null,bestScore=0;
  const tl=typed.toLowerCase();
  roster.forEach(s=>{
    [`${s.first}`,`${s.first} ${s.last||''}`.trim()].forEach(c=>{
      const score=similarity(tl,c.toLowerCase());
      if(score>bestScore){bestScore=score;best={student:s,score};}
    });
  });
  return best;
}

function similarity(a,b){
  if(a===b)return 1;
  if(a.length<2||b.length<2)return 0;
  const bg=new Map();
  for(let i=0;i<a.length-1;i++){const k=a.slice(i,i+2);bg.set(k,(bg.get(k)||0)+1);}
  let n=0;
  for(let i=0;i<b.length-1;i++){const k=b.slice(i,i+2);if(bg.get(k)>0){bg.set(k,bg.get(k)-1);n++;}}
  return(2*n)/(a.length+b.length-2);
}

function collectResponses(){
  const r={};
  document.querySelectorAll('.wsi[data-q]').forEach(el=>{r[el.dataset.q]=el.value;});
  document.querySelectorAll('.wst[data-q]').forEach(el=>{r[el.dataset.q]=el.value;});
  document.querySelectorAll('input[type="radio"]:checked').forEach(el=>{r[el.name]=el.value;});
  const cg={};
  document.querySelectorAll('input[type="checkbox"][data-q]').forEach(el=>{
    if(!cg[el.dataset.q])cg[el.dataset.q]=[];
    if(el.checked)cg[el.dataset.q].push(el.value);
  });
  Object.assign(r,cg);
  return r;
}

async function submitWorksheet(){
  const name=document.getElementById('studentName').value.trim();
  if(!name){alert('Please enter your name before submitting.');document.getElementById('studentName').focus();return;}
  // If roster exists but no match found, warn but allow
  if(roster.length && !matchedStudent){
    const go = confirm(`"${name}" wasn't found in the class list. Your work will still be saved — ask your teacher if your name is spelled correctly. Submit anyway?`);
    if(!go) return;
  }
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='⏳ Submitting...';
  try{
    const res=await fetch('/api/worksheet',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({worksheet_id:worksheetId,student_name:name,student_id:matchedStudent?.id||null,responses:collectResponses()})
    });
    if(!res.ok)throw new Error('Submit failed');
    // Hide grade picker if visible (split-grade link)
    document.querySelector('.pg > div[style*="text-align:center"]')?.remove();
    document.getElementById('worksheetScreen').style.display='none';
    document.getElementById('successScreen').style.display='block';
  }catch(e){btn.disabled=false;btn.textContent='✅ Submit Worksheet';alert('Something went wrong. Please try again.');}
}

function renderWS(text){
  if(!text)return'';wsN=0;let h='';let qCount=0;
  text.split('\n').forEach(line=>{
    if(line.startsWith('## ')){h+=`<h2>${line.slice(3)}</h2>`;return;}
    if(line.startsWith('### ')){h+=`<h3>${line.slice(4)}</h3>`;return;}
    if(line.includes('[TEXT BOX]')){const l=line.replace('[TEXT BOX]','').replace(/^[-*\d.]+\s*/,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim();qCount++;h+=`${l?`<div style="font-size:.9rem;margin-bottom:3px;">${l}</div>`:''}<input class="wsi" type="text" data-q="q${qCount}" placeholder="Write your answer here...">`;return;}
    if(line.includes('[LARGE BOX]')){const l=line.replace('[LARGE BOX]','').replace(/^[-*\d.]+\s*/,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim();qCount++;h+=`${l?`<div style="font-size:.9rem;margin-bottom:3px;">${l}</div>`:''}<textarea class="wst" data-q="q${qCount}" placeholder="Write your answer here..."></textarea>`;return;}
    if(line.includes('[CIRCLE ONE:')){const m=line.match(/\[CIRCLE ONE: (.+?)\]/);const pre=line.split('[CIRCLE ONE:')[0].replace(/^[-*\d.]+\s*/,'').trim();if(m){qCount++;const nm='q'+qCount;h+=`${pre?`<div style="font-size:.9rem;margin-bottom:6px;">${pre}</div>`:''}<div class="wsc">${m[1].split('/').map(o=>`<label class="wscho"><input type="radio" name="${nm}" value="${o.trim()}"> ${o.trim()}</label>`).join('')}</div>`;return;}}
    if(line.includes('[CHECK ALL THAT APPLY:')){const m=line.match(/\[CHECK ALL THAT APPLY: (.+?)\]/);const pre=line.split('[CHECK ALL THAT APPLY:')[0].replace(/^[-*\d.]+\s*/,'').trim();if(m){qCount++;h+=`${pre?`<div style="font-size:.9rem;margin-bottom:6px;">${pre}</div>`:''}<div class="wsc">${m[1].split('/').map((o,oi)=>`<label class="wscho"><input type="checkbox" data-q="q${qCount}" value="${o.trim()}"> ${o.trim()}</label>`).join('')}</div>`;return;}}
    if(line.includes('[WORD BANK:')){const m=line.match(/\[WORD BANK: (.+?)\]/);if(m){h+=`<div class="wswb"><div class="wswbt">📚 Word Bank</div><div class="wswbw">${m[1].split(',').map(w=>`<span class="wswbwd">${w.trim()}</span>`).join('')}</div></div>`;return;}}
    if(line.includes('[DIAGRAM:')){const m=line.match(/\[DIAGRAM: (.+?)\]/);if(m){h+=`<div class="wsd">📊 ${m[1]}</div>`;return;}}
    if(line.match(/^\d+\.\s/)){const cont=line.replace(/^\d+\.\s*/,'');const num=line.match(/^(\d+)/)[1];
      if(cont.includes('[LARGE BOX]')){qCount++;h+=`<div style="margin:9px 0;"><div style="font-size:.9rem;margin-bottom:3px;"><strong>${num}.</strong> ${cont.replace('[LARGE BOX]','').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim()}</div><textarea class="wst" data-q="q${qCount}" placeholder="Write your answer here..."></textarea></div>`;return;}
      if(cont.includes('[TEXT BOX]')){qCount++;h+=`<div style="margin:7px 0;display:flex;align-items:flex-start;gap:7px;"><span style="font-weight:600;flex-shrink:0;">${num}.</span><div style="flex:1;"><div style="font-size:.9rem;margin-bottom:3px;">${cont.replace('[TEXT BOX]','').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim()}</div><input class="wsi" type="text" data-q="q${qCount}" placeholder="Your answer..."></div></div>`;return;}
      h+=`<div style="margin:5px 0;"><strong>${num}.</strong> ${cont.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</div>`;return;}
    if(line.match(/^[-*] /)){h+=`<li style="margin-bottom:3px;">${line.slice(2).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</li>`;return;}
    if(line.trim()===''){h+='<div style="height:5px;"></div>';return;}
    h+=`<p>${line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</p>`;
  });
  return h;
}

loadWorksheet();
