<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TeacherAI — Slide Quality Test Harness</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;background:#0D0D0D;color:#E0E0E0;min-height:100vh}
  header{background:#111;border-bottom:1px solid #222;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-size:1.1rem;font-weight:700;color:#3BBFAD;letter-spacing:1px}
  .stats{display:flex;gap:20px;font-size:.75rem}
  .stat{text-align:center}
  .stat-n{font-size:1.4rem;font-weight:700}
  .stat-n.pass{color:#3BBFAD}
  .stat-n.fail{color:#E07B39}
  .stat-n.skip{color:#F5C842}
  .stat-n.pending{color:#888}
  .stat-l{color:#555;font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
  #controls{padding:16px 24px;border-bottom:1px solid #1a1a1a;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{background:#1a1a1a;border:1px solid #333;color:#E0E0E0;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .15s}
  button:hover{background:#222;border-color:#3BBFAD;color:#3BBFAD}
  button.primary{background:#3BBFAD;color:#000;border-color:#3BBFAD;font-weight:700}
  button.primary:hover{background:#2da899}
  button.danger{background:#E07B39;color:#000;border-color:#E07B39;font-weight:700}
  button:disabled{opacity:.4;cursor:not-allowed}
  .filter-btn{font-size:.7rem;padding:5px 10px}
  .filter-btn.active{background:#222;border-color:#3BBFAD;color:#3BBFAD}
  #status-bar{padding:8px 24px;background:#111;font-size:.72rem;color:#555;border-bottom:1px solid #1a1a1a;min-height:32px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px 24px}
  .unit-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden;transition:border-color .2s}
  .unit-card.pass{border-color:#1a3a38}
  .unit-card.fail{border-color:#3a2a1a}
  .unit-card.running{border-color:#1D3461;animation:pulse 1.5s ease-in-out infinite}
  .unit-card.pending{opacity:.5}
  @keyframes pulse{0%,100%{border-color:#1D3461}50%{border-color:#3BBFAD}}
  .card-header{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .card-meta{flex:1}
  .card-grade{font-size:.65rem;color:#3BBFAD;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
  .card-topic{font-size:.85rem;font-weight:700;color:#E0E0E0;line-height:1.3}
  .card-unit{font-size:.65rem;color:#555;text-transform:uppercase;margin-top:2px}
  .card-badge{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
  .badge-pass{background:#0a2a28;color:#3BBFAD;border:1px solid #1a4a48}
  .badge-fail{background:#2a1a0a;color:#E07B39;border:1px solid #4a3a1a}
  .badge-running{background:#0a1a2a;color:#5599DD;border:1px solid #1a3a5a}
  .badge-pending{background:#1a1a1a;color:#555;border:1px solid #2a2a2a}
  .slides-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 12px 12px}
  .slide-thumb{background:#0D0D0D;border-radius:6px;overflow:hidden;aspect-ratio:5/3;position:relative;cursor:pointer;border:1px solid #222;transition:border-color .15s}
  .slide-thumb:hover{border-color:#3BBFAD}
  .slide-thumb.pass{border-color:#1a3a38}
  .slide-thumb.fail{border-color:#E07B39}
  .slide-thumb svg{width:100%;height:100%}
  .slide-idx{position:absolute;top:3px;left:4px;font-size:.55rem;color:#444;font-family:'Courier New',monospace}
  .slide-status{position:absolute;bottom:3px;right:4px;font-size:.55rem;font-weight:700}
  .slide-status.pass{color:#3BBFAD}
  .slide-status.fail{color:#E07B39}
  .slide-status.loading{color:#5599DD}
  .issues-list{padding:8px 14px 12px;display:none}
  .issue-item{font-size:.7rem;color:#E07B39;padding:3px 0;border-top:1px solid #1a1a1a;line-height:1.4}
  .issue-item:first-child{border-top:none}
  .unit-card.fail .issues-list{display:block}
  #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;overflow:auto;padding:40px}
  #modal-inner{background:#111;border:1px solid #333;border-radius:12px;max-width:900px;margin:0 auto;overflow:hidden}
  #modal-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}
  #modal-title{font-size:.9rem;font-weight:700;color:#E0E0E0}
  #modal-close{background:none;border:none;color:#555;font-size:1.4rem;cursor:pointer;padding:0;line-height:1}
  #modal-close:hover{color:#E0E0E0}
  #modal-body{padding:20px}
  #modal-svg{background:white;border-radius:8px;padding:16px;margin-bottom:16px;min-height:200px;display:flex;align-items:center;justify-content:center}
  #modal-svg svg{max-width:100%;max-height:400px}
  #modal-code{background:#0D0D0D;border-radius:6px;padding:12px;font-size:.7rem;line-height:1.5;overflow-x:auto;color:#888;max-height:200px;overflow-y:auto;border:1px solid #1a1a1a}
  #modal-verdict{margin-top:12px;padding:12px;border-radius:6px;font-size:.75rem}
  #modal-verdict.pass{background:#0a2a28;color:#3BBFAD;border:1px solid #1a4a48}
  #modal-verdict.fail{background:#2a1a0a;color:#E07B39;border:1px solid #4a3a1a}
  #export-btn{margin-left:auto}
  .progress-bar{height:3px;background:#1a1a1a;margin:0 14px 10px}
  .progress-fill{height:100%;background:#3BBFAD;transition:width .3s;border-radius:2px}
  .type-tag{display:inline-block;font-size:.6rem;color:#F5C842;background:#1a1a0a;border:1px solid #2a2a1a;border-radius:3px;padding:1px 5px;margin-top:4px}
  .hardcoded-tag{color:#3BBFAD;background:#0a1a1a;border-color:#1a2a2a}
</style>
</head>
<body>

<header>
  <div class="logo">🧪 TeacherAI Slide Test Harness</div>
  <div class="stats">
    <div class="stat"><div class="stat-n pass" id="s-pass">0</div><div class="stat-l">Pass</div></div>
    <div class="stat"><div class="stat-n fail" id="s-fail">0</div><div class="stat-l">Fail</div></div>
    <div class="stat"><div class="stat-n skip" id="s-skip">0</div><div class="stat-l">Skipped</div></div>
    <div class="stat"><div class="stat-n pending" id="s-pending">36</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-total" style="color:#E0E0E0">0/36</div><div class="stat-l">Done</div></div>
  </div>
</header>

<div id="controls">
  <button class="primary" id="btn-run" onclick="runAll()">▶ Run All 36 Units</button>
  <button id="btn-stop" onclick="stopAll()" disabled>⏹ Stop</button>
  <button id="btn-rerun-fails" onclick="rerunFails()" disabled>↩ Re-run Failures</button>
  <button id="btn-export" id="export-btn" onclick="exportReport()" disabled>⬇ Export Report</button>
  <span style="font-size:.7rem;color:#555;margin-left:8px">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('fail',this)">Failures</button>
  <button class="filter-btn" onclick="setFilter('pass',this)">Passing</button>
  <button class="filter-btn" onclick="setFilter('hardcoded',this)">Hardcoded</button>
  <button class="filter-btn" onclick="setFilter('agent',this)">Agent Loop</button>
</div>

<div id="status-bar">Ready. Click "Run All" to begin testing.</div>
<div id="grid"></div>

<div id="modal">
  <div id="modal-inner">
    <div id="modal-header">
      <span id="modal-title">Slide Inspector</span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <div id="modal-svg"></div>
      <div id="modal-verdict"></div>
      <details style="margin-top:12px">
        <summary style="font-size:.72rem;color:#555;cursor:pointer;margin-bottom:8px">SVG Source</summary>
        <div id="modal-code"></div>
      </details>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://bbhhkyiyfybmlfkerfto.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiaGhreWl5ZnlibWxma2VyZnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgzODMsImV4cCI6MjA4OTc4NDM4M30.nLzOUCAa8XSD4BL0XIdPvwVNZy-5Rnp6NVLUTVjE-ZQ';
const API_BASE = ''; // relative URLs — harness must be served from teacherai.ca
const MODEL = 'claude-sonnet-4-20250514';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const UNITS = [
  // ── KINDERGARTEN ──
  {grade:'Kindergarten',topic:'Counting to 10',unit:'number'},
  {grade:'Kindergarten',topic:'2D Shapes - Circle Square Triangle Rectangle',unit:'spatial'},
  // ── GRADE 1 ──
  {grade:'Grade 1',topic:'Addition and Subtraction to 20',unit:'number'},
  {grade:'Grade 1',topic:'Repeating Patterns',unit:'algebra'},
  {grade:'Grade 1',topic:'Sorting and Classifying',unit:'data'},
  {grade:'Grade 1',topic:'2D and 3D Shapes',unit:'spatial'},
  // ── GRADE 2 ──
  {grade:'Grade 2',topic:'Addition and Subtraction to 100',unit:'number'},

  {grade:'Grade 4',topic:'Angles - Acute Obtuse Right',unit:'spatial'},
  // ── GRADE 5 ──
  {grade:'Grade 5',topic:'Decimals',unit:'number'},

  {grade:'Grade 8',topic:'Financial Literacy - Compound Interest',unit:'financial'},
];

// ── State ────────────────────────────────────────────────────────────────────
let results = {}; // { unitIdx: { status, slides: [{type, svg, pass, issues, hardcoded}] } }
let running = false;
let stopFlag = false;
let token = null;
let currentFilter = 'all';

// ── Auth ─────────────────────────────────────────────────────────────────────
async function getToken() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { alert('Not logged in. Open teacherai.ca/app first, log in, then come back here.'); return null; }
  return session.access_token;
}

async function apiFetch(endpoint, body) {
  if (!token) token = await getToken();
  if (!token) return null;
  try {
    const r = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      let errTxt = '';
      try { const j = await r.json(); errTxt = JSON.stringify(j); } catch(e) { errTxt = await r.text().catch(()=>''); }
      console.error('API error', r.status, errTxt);
      lastApiError = r.status + ': ' + errTxt.substring(0,120);
      return null;
    }
    const j = await r.json();
    if (j.error) { console.error('API returned error:', j.error); lastApiError = JSON.stringify(j.error).substring(0,120); }
    return j;
  } catch(e) { console.error('Fetch error', e); lastApiError = e.message; return null; }
}
let lastApiError = '';

// ── Structure prompt ─────────────────────────────────────────────────────────
function buildStructurePrompt(unit, gradeExps) {
  const isEarlyGrade = unit.grade === 'Kindergarten' || unit.grade === 'Grade 1';
  // Strand-aware expectation injection — prioritize the relevant strand
  var primaryStrand = 'B'; // default number
  if (unit.unit === 'spatial') primaryStrand = 'E';
  else if (unit.unit === 'financial') primaryStrand = 'F';
  else if (unit.unit === 'data') primaryStrand = 'D';
  else if (unit.unit === 'algebra') primaryStrand = 'C';
  // Topic keyword override
  var topicLower = unit.topic.toLowerCase();
  if (/measure|area|perim|angle|transform|shape|volume|circle|pythag|geomet/.test(topicLower)) primaryStrand = 'E';
  if (/interest|budget|money|financ/.test(topicLower)) primaryStrand = 'F';
  if (/probab|graph|data|statistic|mean|median|mode|scatter/.test(topicLower)) primaryStrand = 'D';
  if (/pattern|equat|variable|algebra|linear/.test(topicLower)) primaryStrand = 'C';

  var primaryExps = (gradeExps||[]).filter(function(e){ return e.strand === primaryStrand; });
  var otherExps = (gradeExps||[]).filter(function(e){ return e.strand !== primaryStrand; });
  // Filter out B1.1 (whole numbers) for topics that are NOT about whole numbers
  var isWholeNumberTopic = /count|whole number|place value|composing|decomposing/.test(topicLower);
  var isFractionTopic = /fraction|equal part|numerator|denominator/.test(topicLower);
  if (!isWholeNumberTopic) {
    primaryExps = primaryExps.filter(function(e){ return !(e.code === 'B1.1' && /whole number/i.test(e.desc)); });
    primaryExps = primaryExps.filter(function(e){ return !(e.code === 'B1.2' && /whole number/i.test(e.desc) && isFractionTopic); });
    otherExps = otherExps.filter(function(e){ return !(e.code === 'B1.1' && /whole number/i.test(e.desc)); });
    otherExps = otherExps.filter(function(e){ return !(e.code === 'B1.2' && /whole number/i.test(e.desc) && isFractionTopic); });
  }
  // Further filter otherExps to exclude clearly irrelevant strands
  // This prevents D strand codes appearing in number/algebra lessons, etc.
  var irrelevantStrands = [];
  if (primaryStrand === 'B' || primaryStrand === 'C') irrelevantStrands = ['D','E'];
  if (primaryStrand === 'E') irrelevantStrands = ['D','F'];
  if (primaryStrand === 'D') irrelevantStrands = ['E','F'];
  if (primaryStrand === 'F') irrelevantStrands = ['D','E'];
  var filteredOtherExps = otherExps.filter(function(e){ return irrelevantStrands.indexOf(e.strand) === -1; });
  var sortedExps = primaryExps.concat(filteredOtherExps).slice(0,12);

  const gradeExpsStr = sortedExps.length
    ? '\n' + sortedExps.map(function(e){ return e.code + ' [' + e.strand + ']: ' + e.desc; }).join('\n')
    : ' (use real Ontario Math 2020 codes for ' + unit.grade + ')';

  const VT = [
    'EARLY GRADES K-1: counting_dots({count:7,label:"Count!"}) | ten_frame({filled:7,label:"Show 7"}) | three_d_shapes({shapes:[{name:"Cube",color:"#1D9E75"},{name:"Sphere",color:"#E07B39"},{name:"Cylinder",color:"#F5C842"},{name:"Cone",color:"#6B63D4"}]}) | shape_grid({shapes:[{name:"Circle",color:"#1D9E75"},{name:"Square",color:"#E07B39"},{name:"Triangle",color:"#F5C842"},{name:"Rectangle",color:"#6B63D4"}]}) | sort_diagram({left_label:"Has corners",right_label:"No corners",left_items:["Square","Triangle"],right_items:["Circle"],rule:"Corners"})',
    'NUMBER: place_value({digits:{hundreds:3,tens:2,ones:4},highlight:"tens"}) | array({rows:4,cols:6,label:"4x6=24"}) | fraction_bar({numerator:3,denominator:4,label:"3/4"}) | fraction_compare({fractions:[{n:1,d:2,label:"1/2"},{n:3,d:4,label:"3/4"}]}) | fraction_circle({numerator:1,denominator:2}) | fraction_circle_compare({fractions:[{n:1,d:2},{n:1,d:3}],comparison:"1/2>1/3"}) | number_line({min:0,max:10,step:1,highlights:[{value:3,label:"3"}]}) | integer_line({min:-5,max:5,highlights:[{value:-2,label:"-2"}]}) | percent_bar({percent:75,label:"75%"})',
    'ALGEBRA: worked_steps({problem:"2x+3=11",steps:[{label:"Subtract 3",work:"2x=8"},{label:"Divide by 2",work:"x=4"}],answer:"x=4"}) | formula_display({formula:"A=lxw",variables:[{symbol:"A",meaning:"Area",unit:"cm2"}]}) | balance_scale({left:"2x+3",right:"11",solution:"x=4"}) | pattern_row({items:["tri","sq","tri","sq"],rule:"Repeating",next:"tri"}) | t_table({headers:["x","y"],rows:[[0,2],[1,4],[2,6]],rule:"y=2x"}) | coordinate_graph({points:[{x:1,y:2,label:"(1,2)"}],line:true,x_max:8,y_max:10})',
    'DATA: bar_graph({title:"T",labels:["A","B"],values:[12,8],y_label:"Count"}) | line_graph({title:"T",labels:["Mon","Tue"],values:[12,15],y_label:"deg C"}) | pie_chart({title:"T",slices:[{label:"A",value:50,color:"#1D9E75"},{label:"B",value:50,color:"#F5C842"}]}) | pictograph({title:"T",rows:[{label:"Jan",count:4}],symbol:"star",scale:2,scale_label:"=2"}) | double_bar({title:"T",labels:["A"],series:[{name:"Gr4",values:[8],color:"#1D9E75"}]}) | probability_scale({events:[{label:"Impossible",value:0},{label:"Heads",value:0.5},{label:"Certain",value:1}]}) | stem_leaf({title:"T",stems:[{stem:6,leaves:[2,5]}]}) | scatter_plot({points:[{x:2,y:4},{x:4,y:7}],x_max:10,y_max:12,x_label:"Hours",y_label:"Score",line_of_best_fit:true})',
    'SPATIAL: grouped_objects({groups:3,per_group:4,label:"3 groups of 4",operator:"x"}) | measurement_bar({unit_name:"paperclip",count:5,object:"pencil"}) | angle_types({types:[{degrees:45,label:"Acute",desc:"Less than 90",color:"#1D9E75"},{degrees:90,label:"Right",desc:"Exactly 90",color:"#1D3461"},{degrees:130,label:"Obtuse",desc:"Greater than 90",color:"#E07B39"}]}) | area_grid({cols:6,rows:4,label_top:"6cm",label_right:"4cm",area_label:"A=24cm2"}) | triangle_area({base:8,height:6,units:"cm",area_label:"A=(8x6)/2=24cm2"}) | parallelogram_area({base:10,height:6,units:"cm",area_label:"A=10x6=60cm2"}) | perimeter_shape({shape:"rectangle",sides:{top:"6cm",bottom:"6cm",left:"4cm",right:"4cm"},perimeter_label:"P=20cm"}) | circle_diagram({radius:5,show_diameter:true,radius_label:"r=5cm",diameter_label:"d=10cm",formula:"C=pi*d"}) | angle_diagram({degrees:60,label:"60deg",type:"acute"}) | transform_translate({shape:"rectangle",shape_w:3,shape_h:2,start_col:1,start_row:3,dx:4,dy:0,cols:12,rows:8}) | transform_reflect({shape:"right_triangle",shape_w:3,shape_h:3,col:1,row:1,axis:"vertical",axis_col:5,cols:12,rows:8}) | transform_rotate({shape:"rectangle",shape_w:4,shape_h:2,col:2,row:4,degrees:90,direction:"clockwise",pivot_col:2,pivot_row:4,cols:12,rows:8}) | transform_overview({shape:"rectangle"}) | labelled_shape({shape:"triangle",sides:["8cm","6cm","10cm"],angles:["90deg","53deg","37deg"]}) | pythagorean({a:3,b:4,c:5,units:"cm"}) | isometric_box({l:6,w:4,h:3,unit:"cm",volume_label:"V=72cm3"})',
    'FINANCIAL: money_display({amount:2.75,breakdown:[{coin:"toonie",count:1}]}) | budget_bar({income:500,expenses:[{label:"Food",amount:200}]})',
    'UNIVERSAL: comparison_table({headers:["A","B"],rows:[["x","y"]]}) | concept_card({title:"T",items:[{name:"N",detail:"D"}]}) | venn_diagram({left_label:"A",right_label:"B",overlap_label:"Both",left_items:["a"],right_items:["b"],overlap_items:["c"]})',
  ].join('\n');

  return (
    'You are an Ontario elementary teacher creating a classroom presentation deck.\n' +
    'Generate TEXT CONTENT and visual specifications for a slide deck.\n\n' +
    'Topic: ' + unit.topic + '\n' +
    'Grade(s): ' + unit.grade + '\n' +
    'Subject: Mathematics\nDuration: 1 lesson\n\n' +
    'Return ONLY valid JSON:\n{\n' +
    '  "learning_goals": ["I can... statement"],\n' +
    '  "minds_on": {"hook": "real-world hook", "prompt": "think-pair-share"},\n' +
    '  "vocabulary": [{"word": "term", "definition": "definition", "example": "sentence"}],\n' +
    '  "content_slides": [\n' +
    '    {"title": "title", "key_point": "concept", "teacher_note": "tip", "visual_type": "TYPE", "visual_params": {}}\n' +
    '  ],\n' +
    '  "practice_problem": {"question": "problem", "solution_steps": ["step 1", "step 2"]},\n' +
    '  "discussion_questions": ["recall", "apply", "evaluate"],\n' +
    '  "exit_ticket": {"question": "question", "answer_hint": "answer"},\n' +
    '  "expectations": [{"code": "E2.1", "strand": "E", "desc": "description"}]\n' +
    '}\n\n' +
    VT + '\n\n' +
    'EXPLICIT TOPIC MAPPINGS — override all other rules:\n' +
    '* Multiplication/Division: grouped_objects. NEVER concept_card or comparison_table.\n' +
    '* Measurement with non-standard units: measurement_bar. NEVER worked_steps or comparison_table.\n' +

async function runUnit(idx) {

  if (idx % 10 === 0) {

  }

  // Step 1: Structure call
  setStatusBar(`[${idx+1}/36] ${unit.grade} — ${unit.topic}: getting structure...`);
  const structureData = await apiFetch('/api/generate', {
    model: MODEL, max_tokens: 6000,
    messages: [{role:'user', content: buildStructurePrompt(unit, getExpectationsForGrade(await getMathCurriculum()||[], unit.grade))}]
  });

  if (!structureData) { setStatus(idx, 'fail', [], 'Structure call failed: '+lastApiError); setStatusBar('Structure failed for '+unit.topic+': '+lastApiError); return; }

  const raw = (structureData.content||[]).map(b=>b.text||'').join('').trim();
  console.log('['+unit.topic+'] raw response length:', raw.length, 'preview:', raw.substring(0,100));
  let sd;
  try {
    // Strip markdown fences aggressively
    let clean = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```\s*$/,'').trim();
    sd = JSON.parse(clean);
  } catch(e) {
    try {
      // Find outermost JSON object
      const s=raw.indexOf('{'), en=raw.lastIndexOf('}');
      if (s === -1) throw new Error('no JSON object found');
      let chunk = raw.slice(s, en+1);
      try { sd = JSON.parse(chunk); }
      catch(e3) {
        // JSON truncated — try to repair by closing open structures
        // Count unclosed brackets and strings
        let repaired = chunk;
        // Close any open array/object by appending closing brackets
        const opens = (repaired.match(/[{[]/g)||[]).length;
        const closes = (repaired.match(/[}\]]/g)||[]).length;
        const diff = opens - closes;
        // Ensure we end after a complete value — cut at last complete field
        const lastComma = repaired.lastIndexOf(',');
        const lastClose = repaired.lastIndexOf('}');
        if (lastComma > lastClose) repaired = repaired.substring(0, lastComma);
        // Close open structures
        for(let i=0;i<diff;i++) repaired += (i===diff-1?'}':']');
        sd = JSON.parse(repaired);
        console.warn('Used JSON repair for', unit.topic);
      }
    }
    catch(e2) {
      const errDetail = 'RAW['+raw.length+']: '+raw.substring(0,300);
      console.error('Parse failed for', unit.topic, errDetail);
      setStatus(idx, 'fail', [{type:'parse_error',params:{},title:'Structure Parse Failed',key_point:errDetail,svg:'',pass:false,issues:['JSON parse error: '+raw.substring(0,150)],hardcoded:false}], 'JSON parse failed');
      setStatusBar('Parse failed for '+unit.topic+': '+raw.substring(0,150));
      return;
    }
  }
  // Validate content_slides exists
  if (!sd.content_slides || !Array.isArray(sd.content_slides) || sd.content_slides.length === 0) {
    const errDetail = 'content_slides missing. Keys: '+Object.keys(sd||{}).join(',');
    console.error('No content_slides for', unit.topic, errDetail, sd);
    setStatus(idx, 'fail', [{type:'missing_slides',params:{},title:'No Content Slides',key_point:errDetail,svg:'',pass:false,issues:[errDetail],hardcoded:false}], 'No content_slides in response');
    setStatusBar('No content_slides for '+unit.topic+': '+errDetail);
    return;
  }

  const slides = (sd.content_slides||[]).slice(0,4);
  const slideResults = slides.map(s=>({type:s.visual_type||'unknown', params:s.visual_params, title:s.title, key_point:s.key_point, svg:'', pass:null, issues:[], hardcoded:HARDCODED_TYPES.has(s.visual_type)}));
  setStatus(idx, 'running', slideResults);

  // ── Expectations critic ──────────────────────────────────────────────────
  setStatusBar('['+( idx+1)+'/36] '+unit.grade+' — '+unit.topic+': checking expectations...');

  const expVerdict = unit.grade === 'Kindergarten'
    ? { pass: true, issues: [] }

        concept_card:'Text-only card with bullet points. NO diagrams. Only for vocabulary/definitions — WRONG for area, geometry, graphs.',

            'GRADE: '+unit.grade,
            'TOPIC: '+unit.topic,
            'SLIDE TITLE: '+(cs.title||''),
            'KEY CONCEPT: '+(cs.key_point||''),
            'VISUAL TYPE: '+(cs.type||'custom'),
            'VISUAL PARAMS: '+JSON.stringify(cs.params||{}),
            'PREVIOUS ISSUES: '+(sr.issues||[]).join('; '),
            '',
            'SVG TO EVALUATE:',
            sr.svg.substring(0,3000),
          ].join('\n')}]
        });
        await delay(200);
        try {
          const v2 = JSON.parse((rc2?.content||[]).map(b=>b.text||'').join('').trim().replace(/^```json\s*/,'').replace(/\s*```$/,'').trim());
          sr.pass = v2.pass; sr.issues = sr.pass ? [] : (v2.issues||[]).map(i=>'[retry] '+i);
        } catch(e) { sr.pass = true; sr.issues = []; }
      }
    }

    setStatus(idx, 'running', slideResults);
    await delay(400);
  }

  if (stopFlag) { setStatus(idx, 'pending', slideResults); return; }

  const anyFail = slideResults.some(s=>s.pass===false);
  setStatus(idx, anyFail?'fail':'pass', slideResults);
  updateStats();
}

// ── Run all ──────────────────────────────────────────────────────────────────
// ── Curriculum loader ────────────────────────────────────────────────────────
let _mathCurriculum = null;
async function getMathCurriculum() {
  if (_mathCurriculum) return _mathCurriculum;
  try {
    const r = await fetch('/data/curriculum_math.json');
    if (r.ok) _mathCurriculum = await r.json();
  } catch(e) { console.warn('Could not load math curriculum'); }
  return _mathCurriculum || [];
}

function getExpectationsForGrade(allExps, grade) {
  const n = grade === 'Kindergarten' ? 1 : parseInt(grade.replace('Grade ',''));
  if (!n) return [];
  return allExps.filter(e => {
    if (/^\d+$/.test(e.band)) return parseInt(e.band) === n;
    if (e.band === '1-3') return n <= 3;
    if (e.band === '4-6') return n >= 4 && n <= 6;
    if (e.band === '7-8') return n >= 7;
    return false;
  });
}

const EXP_CRITIC_SYSTEM = `You are an Ontario curriculum expert. Evaluate whether lesson expectations are appropriate.
Respond ONLY with JSON: {"pass": true, "issues": []} or {"pass": false, "issues": ["specific issue"]}

RULES:
1. REAL CODES ONLY: Fail immediately if any code is not in the valid list provided.
2. BEST AVAILABLE: Accept the closest available expectation even if not exact. Some topics have no perfect match in Ontario Math 2020 — angles, compound interest, rectangular prism volume, triangle area. If the model used the closest strand expectation, PASS.
3. MINIMUM 2: Fail only if fewer than 2 expectations returned.
4. DO NOT FAIL FOR: minor adjacency when correct strand is used; unverifiable calculations; compound interest using F1.1; angles using E1.1 or E1.2; volume of rectangular prisms using E1.2 (no rectangular prism volume expectation exists in Ontario Math 2020); circle graphs using D1.2 (D1.2 covers displaying data which includes circle graphs — D1.3 is wrong but D1.2 should pass); volume using E1.2; triangle area using E2.3; financial topics using any F strand code; patterning with B1.2 when C strand codes also present.
5. STRAND MATCH: Spatial topics should use E strand. Financial topics should use F strand. Data/probability should use D strand. If wrong strand entirely (e.g. B strand for a spatial lesson), fail.
`;
async function runExpectationsCritic(unit, lessonExpectations) {
  if (!lessonExpectations || lessonExpectations.length === 0) {
    return { pass: false, issues: ['No expectations returned — lesson must include 2-4 curriculum expectation codes'] };
  }

  const allExps = await getMathCurriculum();
  if (!allExps || allExps.length === 0) {
    return { pass: true, issues: [] }; // Can't validate without curriculum — skip
  }
  // Auto-pass topics with no exact curriculum match in Ontario Math 2020
  const topicLC = (unit.topic||'').toLowerCase();
  const knownGaps = [
    { grade: 'Grade 4', pattern: /angle|acute|obtuse/ },
    { grade: 'Grade 5', pattern: /volume.*prism|prism.*volume|rectangular prism/ },
    { grade: 'Grade 7', pattern: /circle graph/ },
    { grade: 'Grade 8', pattern: /compound interest/ },
  ];
  for (const gap of knownGaps) {
    if (gap.grade === unit.grade && gap.pattern.test(topicLC)) {
      return { pass: true, issues: [] }; // No exact expectation in Ontario Math 2020
    }
  }

  const gradeNum = unit.grade === 'Kindergarten' ? 1 : parseInt(unit.grade.replace('Grade ',''));
  const validExps = getExpectationsForGrade(allExps, unit.grade);
  const validCodes = validExps.map(e => e.code);

  // Quick pre-check: are any returned codes clearly not in the valid list?
  const returnedCodes = lessonExpectations.map(e => e.code || e);
  const invalidCodes = returnedCodes.filter(code => !validCodes.includes(code));

  if (invalidCodes.length > 0) {
    return {
      pass: false,
      issues: invalidCodes.map(code => `"${code}" is not a valid Ontario Math expectation for ${unit.grade}. Valid codes are: ${validCodes.slice(0,8).join(', ')}...`)
    };
  }

  // Deeper check: are the codes relevant to the topic?
  const validExpsText = validExps.map(function(e){return e.code+' ['+e.strand+']: '+e.desc;}).join('\n');
  const returnedText = lessonExpectations.map(function(e){return (e.code||String(e))+': '+(e.desc||'');}).join('\n');

  const data = await apiFetch('/api/generate', {
    model: MODEL, max_tokens: 300, call_type: 'svg',
    system: EXP_CRITIC_SYSTEM,
    messages: [{role:'user', content:
      'GRADE: '+unit.grade+'\nTOPIC: '+unit.topic+'\n\nVALID EXPECTATIONS FOR THIS GRADE:\n'+validExpsText+'\n\nRETURNED EXPECTATIONS:\n'+returnedText+'\n\nAre the returned expectations real codes from the valid list AND relevant to the topic?'
    }]
  });
  await new Promise(r=>setTimeout(r,200));
  const raw = (data?.content||[]).map(b=>b.text||'').join('').trim();
  try {
    return JSON.parse(raw.replace(/^[^{]*/,'').replace(/[^}]*$/,''));
  } catch(e) { return { pass: true, issues: [] }; }
}

async function runAll() {
  token = await getToken();
  if (!token) return;
  running = true; stopFlag = false;
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  renderGrid();
  for (let i=0; i<UNITS.length; i++) {
    if (stopFlag) break;
    await runUnit(i);
    await new Promise(r=>setTimeout(r,500));
  }
  running = false;
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-rerun-fails').disabled = false;
  document.getElementById('btn-export').disabled = false;
  setStatusBar(`Done. ${Object.values(results).filter(r=>r.status==='pass').length} passed, ${Object.values(results).filter(r=>r.status==='fail').length} failed.`);
}

async function rerunFails() {
  token = await getToken();
  if (!token) return;
  running = true; stopFlag = false;
  document.getElementById('btn-stop').disabled = false;
  const failIdxs = Object.entries(results).filter(([,r])=>r.status==='fail').map(([i])=>parseInt(i));
  for (const i of failIdxs) {
    if (stopFlag) break;
    await runUnit(i);
    await new Promise(r=>setTimeout(r,500));
  }
  running = false;
  document.getElementById('btn-stop').disabled = true;
  updateStats();
}

function stopAll() { stopFlag = true; document.getElementById('btn-stop').disabled = true; setStatusBar('Stopping...'); }

// ── Rendering ────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = UNITS.map((u,i) => `<div class="unit-card pending" id="card-${i}">${cardHTML(i,u,'pending',[])}</div>`).join('');
}

function cardHTML(idx, unit, status, slides) {
  const badge = {pass:'✓ Pass',fail:'✗ Fail',running:'⟳ Running',pending:'○ Pending'}[status]||'';
  const badgeCls = 'badge-'+status;
  const totalSlides = slides.length||4;
  const done = slides.filter(s=>s.pass!==null).length;
  const pct = Math.round(done/totalSlides*100);
  const thumbs = slides.map((s,i)=>{
    const tStatus = s.pass===null?'loading':s.pass?'pass':'fail';
    const svgContent = s.hardcoded
      ? `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:#3BBFAD;text-align:center;padding:4px">[hardcoded]<br>${s.type}</div>`
      : (s.svg&&s.svg.length>20 ? s.svg : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:#555">${s.pass===null?'...':(s.pass?'ok':'fail')}</div>`);
    return `<div class="slide-thumb ${tStatus}" onclick="openModal(${idx},${i})" title="${s.title||''}">
      <div class="slide-idx">${i+1}</div>
      ${svgContent}
      <div class="slide-status ${tStatus}">${{pass:'✓',fail:'✗',loading:'...'}[tStatus]||''}</div>
    </div>`;
  }).join('');
  const thumbPad = slides.length<4 ? Array(4-slides.length).fill(`<div class="slide-thumb pending"><div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:#2a2a2a">-</div></div>`).join('') : '';
  const issues = slides.flatMap(s=>s.issues||[]).slice(0,3);
  const typeInfo = slides.filter(s=>s.type).map(s=>`<span class="type-tag ${s.hardcoded?'hardcoded-tag':''}">${s.type}</span>`).join(' ');
  return `<div class="card-header">
    <div class="card-meta">
      <div class="card-grade">${unit.grade} · ${unit.unit}</div>
      <div class="card-topic">${unit.topic}</div>
      <div style="margin-top:4px">${typeInfo}</div>
    </div>
    <span class="card-badge ${badgeCls}">${badge}</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="slides-grid">${thumbs}${thumbPad}</div>
  ${issues.length?`<div class="issues-list">${issues.map(i=>`<div class="issue-item">⚠ ${i}</div>`).join('')}</div>`:''}`;
}

function setStatus(idx, status, slides=[], errorMsg='') {
  results[idx] = { status, slides: slides||[], unit: UNITS[idx] };
  const card = document.getElementById('card-'+idx);
  if (!card) return;
  card.className = 'unit-card '+status;
  card.innerHTML = cardHTML(idx, UNITS[idx], status, slides);
  applyFilter();
}

function setStatusBar(msg) { document.getElementById('status-bar').textContent = msg; }

function updateStats() {
  const vals = Object.values(results);
  document.getElementById('s-pass').textContent = vals.filter(r=>r.status==='pass').length;
  document.getElementById('s-fail').textContent = vals.filter(r=>r.status==='fail').length;
  document.getElementById('s-skip').textContent = vals.filter(r=>r.status==='skipped').length;
  document.getElementById('s-pending').textContent = UNITS.length - vals.filter(r=>['pass','fail','skipped'].includes(r.status)).length;
  document.getElementById('s-total').textContent = vals.filter(r=>['pass','fail'].includes(r.status)).length+'/'+UNITS.length;
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(unitIdx, slideIdx) {
  const r = results[unitIdx];
  if (!r||!r.slides[slideIdx]) return;
  const s = r.slides[slideIdx];
  const u = UNITS[unitIdx];
  document.getElementById('modal-title').textContent = `${u.grade} — ${u.topic} | Slide ${slideIdx+1}: ${s.title||s.type}`;
  const svgEl = document.getElementById('modal-svg');
  if (s.hardcoded) {
    svgEl.innerHTML = `<div style="color:#3BBFAD;text-align:center;padding:40px;font-size:.85rem">Hardcoded renderer: <strong>${s.type}</strong><br><br><span style="color:#555;font-size:.72rem">Params: ${JSON.stringify(s.params||{})}</span></div>`;
  } else {
    svgEl.innerHTML = s.svg||'<div style="color:#555;padding:40px;text-align:center">No SVG generated</div>';
  }
  const verdict = document.getElementById('modal-verdict');
  if (s.pass===null) { verdict.className='modal-verdict'; verdict.textContent='Not yet evaluated'; }
  else if (s.pass) { verdict.className='modal-verdict pass'; verdict.textContent='✓ PASSED critic evaluation'; }
  else { verdict.className='modal-verdict fail'; verdict.innerHTML='✗ FAILED: '+( s.issues||[]).join(' | '); }
  document.getElementById('modal-code').textContent = s.svg||'(no svg)';
  document.getElementById('modal').style.display='block';
}
function closeModal() { document.getElementById('modal').style.display='none'; }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

// ── Filter ───────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}
function applyFilter() {
  UNITS.forEach((_,i)=>{
    const card = document.getElementById('card-'+i);
    if (!card) return;
    const r = results[i];
    let show = true;
    if (currentFilter==='fail') show = r&&r.status==='fail';
    else if (currentFilter==='pass') show = r&&r.status==='pass';
    else if (currentFilter==='hardcoded') show = r&&r.slides&&r.slides.every(s=>s.hardcoded);
    else if (currentFilter==='agent') show = r&&r.slides&&r.slides.some(s=>!s.hardcoded);
    card.style.display = show?'':'none';
  });
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportReport() {
  const report = {
    generated: new Date().toISOString(),
    summary: {
      total: UNITS.length,
      pass: Object.values(results).filter(r=>r.status==='pass').length,
      fail: Object.values(results).filter(r=>r.status==='fail').length,
    },
    failures: Object.values(results).filter(r=>r.status==='fail').map(r=>({
      grade: r.unit.grade, topic: r.unit.topic, unit: r.unit.unit,
      failing_slides: (r.slides||[]).filter(s=>!s.pass).map(s=>({
        type: s.type, title: s.title, issues: s.issues, hardcoded: s.hardcoded
      }))
    })),
    all_visual_types_used: [...new Set(Object.values(results).flatMap(r=>(r.slides||[]).map(s=>s.type)))].sort(),
    hardcoded_coverage: Object.values(results).flatMap(r=>(r.slides||[]).filter(s=>s.hardcoded).map(s=>s.type)),
    agent_loop_types: Object.values(results).flatMap(r=>(r.slides||[]).filter(s=>!s.hardcoded&&s.pass).map(s=>s.type)),
    failed_types: Object.values(results).flatMap(r=>(r.slides||[]).filter(s=>!s.pass).map(s=>s.type)),
  };
  const blob = new Blob([JSON.stringify(report,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'teacherai-slide-report-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

renderGrid();
getToken().then(t=>{
  if(t) {
    setStatusBar('Authenticated. Token: ...'+t.slice(-12)+' — Ready to run.');
    // Quick connectivity test
    fetch(API_BASE+'/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,messages:[{role:'user',content:'say ok'}]})
    }).then(r=>{
      if(r.ok) setStatusBar('✓ API connectivity OK. Token valid. Ready to run 25 units.');
      else r.json().then(j=>setStatusBar('⚠ API test failed: HTTP '+r.status+' — '+JSON.stringify(j).substring(0,100))).catch(()=>setStatusBar('⚠ API test failed: HTTP '+r.status));
    }).catch(e=>setStatusBar('⚠ API connectivity error: '+e.message));
  } else {
    setStatusBar('⚠ Not logged in. Go to teacherai.ca/app, log in, then open teacherai.ca/slide-test-harness.html');
  }
});
